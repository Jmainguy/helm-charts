{{- if not .Values.virtualService.hosts }}
{{- fail "virtualService.hosts is required" }}
{{- end }}
{{- if not .Values.redirect.authority }}
{{- fail "redirect.authority is required" }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Namespace }}-tls
  namespace: istio-system
spec:
  secretName: {{ .Release.Namespace }}-tls
  issuerRef:
    name: {{ .Values.cert.issuer | default "letsencrypt-http" }}
    kind: ClusterIssuer
  dnsNames:
{{- range .Values.virtualService.hosts }}
    - {{ . | quote }}
{{- end }}
